apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: upchar-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/your-repo'
    targetRevision: HEAD
    path: infra/aks/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: upchar-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
