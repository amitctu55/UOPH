apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: upchar-dev
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: upchar/auth-service:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: jwtSecret
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 4000
            initialDelaySeconds: 6
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
