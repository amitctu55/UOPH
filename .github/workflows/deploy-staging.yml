name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_run:
    workflows: ["Build & Publish"]
    types: [completed]

jobs:
  deploy-staging:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitActionsOIDCRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name eks-cluster-staging --region ${{ secrets.AWS_REGION }} --alias eks-staging

      - name: Deploy to EKS
        run: |
          helm upgrade --install upsphere ./infra/helm/upsphere-platform \
            --namespace staging \
            --values ./infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait

      - name: Run Smoke Tests
        run: |
          npm run test:smoke -- --base-url=https://staging.upsphere.io

      - name: Notify Deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}